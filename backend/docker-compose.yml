services:
  postgres:
    image: postgres:16-alpine
    container_name: macradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: macradar
      POSTGRES_USER: macradar
      POSTGRES_PASSWORD: macradar
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U macradar -d macradar']
      interval: 5s
      timeout: 5s
      retries: 10

